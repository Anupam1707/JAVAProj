name: Build Installers (All Platforms)

# ── Triggers ────────────────────────────────────────────────────────────────
# • Push a tag like "v1.1" → full build + GitHub Release created automatically
# • Push to main/master   → build only (artifacts kept 30 days, no release)
# • Manual "Run workflow" → build only
on:
  push:
    branches: [ main, master ]
    tags:     [ 'v*' ]          # e.g. v1.1, v2.0.1
  workflow_dispatch:

# Allow the release job to create / update GitHub Releases
permissions:
  contents: write

env:
  APP_VERSION: '1.0.0'

# ══════════════════════════════════════════════════════════════════════════════
# WORKFLOW NOTES
# ════════════════════════════════════
#
# Triggers:
#   - Tag push (v*):     Full build + GitHub Release
#   - Branch push:       Build only, no release
#   - Manual trigger:    Build only
#
# Platforms:
#   • macOS (arm64/x86):  DMG installer
#   • Windows:            EXE + MSI installers
#   • Linux:              DEB + RPM packages
#
# Version:  Derived from tag when available (v4.0 -> 4.0),
#           otherwise falls back to 2.1.2 for branch/manual builds.
# Version:  Derived from tag when available (v4.0 -> 4.0),
#           otherwise falls back to 1.0.0 for branch/manual builds.
#
# Build Time: ~45-60 minutes (full CI/CD chain)
#
# Artifacts: Retained 30 days on failed/branch builds
#            Permanently published on GitHub Releases for tags
# ══════════════════════════════════════════════════════════════════════════════

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # Single matrix job for all platforms:
  #   • macOS   -> .dmg
  #   • Windows -> .exe
  #   • Linux   -> .deb + .rpm
  # ──────────────────────────────────────────────────────────────────────────
  build-all:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS DMG
            artifact_name: SmartCityTraffic-macOS
          - os: windows-latest
            label: Windows EXE
            artifact_name: SmartCityTraffic-Windows
          - os: ubuntu-latest
            label: Linux DEB + RPM
            artifact_name: SmartCityTraffic-Linux

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Resolve APP_VERSION from tag
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            resolved_version="${GITHUB_REF_NAME#v}"
          else
            resolved_version="$APP_VERSION"
          fi

          echo "APP_VERSION=$resolved_version" >> "$GITHUB_ENV"
          echo "Using APP_VERSION=$resolved_version"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install RPM tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y rpm imagemagick

      - name: Compile + Build JAR (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p out
          find src -name "*.java" | xargs javac -d out
          jar --create \
              --file SmartCityTraffic.jar \
              --main-class com.smartcity.traffic.Main \
              -C out .

      - name: Compile + Build JAR (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          $files = Get-ChildItem -Recurse -Filter *.java src | Select-Object -ExpandProperty FullName
          javac -d out $files
          jar --create `
              --file SmartCityTraffic.jar `
              --main-class com.smartcity.traffic.Main `
              -C out .

      - name: Add WiX to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # WiX 3.x is pre-installed on windows-latest; find it dynamically.
          $wixDir = Get-ChildItem "C:\Program Files (x86)" -Filter "WiX Toolset v3*" -Directory |
                    Sort-Object Name -Descending |
                    Select-Object -First 1 -ExpandProperty FullName
          if (-not $wixDir) {
            choco install wixtoolset -y --no-progress
            $wixDir = Get-ChildItem "C:\Program Files (x86)" -Filter "WiX Toolset v3*" -Directory |
                      Sort-Object Name -Descending |
                      Select-Object -First 1 -ExpandProperty FullName
          }
          Write-Host "Using WiX at: $wixDir\bin"
          "$wixDir\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install ImageMagick (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install imagemagick -y --no-progress

      - name: Prepare jpackage input (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          rm -rf package-input
          mkdir -p package-input
          cp SmartCityTraffic.jar package-input/

      - name: Prepare jpackage input (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path package-input) {
            Remove-Item -Recurse -Force package-input
          }
          New-Item -ItemType Directory -Force -Path package-input | Out-Null
          Copy-Item -Path SmartCityTraffic.jar -Destination package-input

      - name: Convert logo to PNG (Linux)
        if: runner.os == 'Linux'
        run: |
          convert logo.jpeg -resize 256x256 package-input/logo.png

      - name: Convert logo to ICNS (macOS)
        if: runner.os == 'macOS'
        run: |
          rm -rf icon.iconset
          mkdir -p icon.iconset
          sips -s format png logo.jpeg --out package-input/logo.png
          sips -z 16 16 package-input/logo.png --out icon.iconset/icon_16x16.png
          sips -z 32 32 package-input/logo.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32 package-input/logo.png --out icon.iconset/icon_32x32.png
          sips -z 64 64 package-input/logo.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128 package-input/logo.png --out icon.iconset/icon_128x128.png
          sips -z 256 256 package-input/logo.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256 package-input/logo.png --out icon.iconset/icon_256x256.png
          sips -z 512 512 package-input/logo.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512 package-input/logo.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 package-input/logo.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o package-input/logo.icns

      - name: Convert logo to ICO (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          magick logo.jpeg -resize 256x256 package-input/logo.ico

      - name: Package DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          jpackage \
            --type dmg \
            --name "SmartCityTraffic" \
            --app-version "$APP_VERSION" \
            --vendor "OOPS Project" \
            --description "Smart City Traffic Simulator" \
            --input package-input \
            --main-jar SmartCityTraffic.jar \
            --main-class com.smartcity.traffic.Main \
            --icon package-input/logo.icns \
            --dest dist \
            --java-options "-Xmx512m" \
            --mac-package-name "SmartCityTraffic"

      - name: Package EXE (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          jpackage `
            --type exe `
            --name "SmartCityTraffic" `
            --app-version "$env:APP_VERSION" `
            --vendor "OOPS Project" `
            --description "Smart City Traffic Simulator" `
            --input package-input `
            --main-jar SmartCityTraffic.jar `
            --main-class com.smartcity.traffic.Main `
            --icon package-input/logo.ico `
            --dest dist `
            --java-options "-Xmx512m" `
            --win-shortcut `
            --win-menu `
            --win-menu-group "Smart City" `
            --win-dir-chooser

      - name: Package DEB + RPM (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          jpackage \
            --type deb \
            --name "smartcitytraffic" \
            --app-version "$APP_VERSION" \
            --vendor "OOPS Project" \
            --description "Smart City Traffic Simulator" \
            --input package-input \
            --main-jar SmartCityTraffic.jar \
            --main-class com.smartcity.traffic.Main \
            --icon package-input/logo.png \
            --dest dist \
            --java-options "-Xmx512m" \
            --linux-shortcut \
            --linux-menu-group "Education"

          jpackage \
            --type rpm \
            --name "smartcitytraffic" \
            --app-version "$APP_VERSION" \
            --vendor "OOPS Project" \
            --description "Smart City Traffic Simulator" \
            --input package-input \
            --main-jar SmartCityTraffic.jar \
            --main-class com.smartcity.traffic.Main \
            --icon package-input/logo.png \
            --dest dist \
            --java-options "-Xmx512m" \
            --linux-shortcut \
            --linux-menu-group "Education"

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.deb
            dist/*.rpm
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # Release → only runs when a version tag is pushed (e.g. git tag v1.1)
  # Waits for matrix build, then publishes a GitHub Release with explicit files.
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [ build-all ]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: SmartCityTraffic-macOS
          path: release-files

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: SmartCityTraffic-Windows
          path: release-files

      - name: Download Linux installers
        uses: actions/download-artifact@v4
        with:
          name: SmartCityTraffic-Linux
          path: release-files

      - name: List release files
        run: ls -lh release-files/

      - name: Prepare release body
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            release_version="${GITHUB_REF_NAME#v}"
          else
            release_version="$APP_VERSION"
          fi

          cat > release-body.md <<EOF
          ## Smart City Traffic Simulator Latest

          ### Downloads
          | Platform | Installer |
          |----------|-----------|
          | 🍎 macOS | SmartCityTraffic-${release_version}.dmg |
          | 🪟 Windows | SmartCityTraffic-${release_version}.exe |
          | 🐧 Linux (Debian/Ubuntu) | smartcitytraffic_${release_version}-1_amd64.deb |
          | 🐧 Linux (Fedora/RHEL) | smartcitytraffic-${release_version}-1.x86_64.rpm |

          > **No Java required** — all installers bundle their own JRE.

          ### Features
          - 4-way smart traffic intersection simulation
          - Real-time adaptive signal control
          - Emergency vehicle (ambulance) override
          - Pause/Resume, speed control, per-lane stats
          - In-app log viewer with file logging
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Smart City Traffic Simulator ${{ github.ref_name }}"
          body_path: release-body.md
          files: |
            release-files/*.dmg
            release-files/*.exe
            release-files/*.deb
            release-files/*.rpm
          draft: false
          prerelease: false
