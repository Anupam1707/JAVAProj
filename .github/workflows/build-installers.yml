name: Build Installers (All Platforms)

# ── Triggers ────────────────────────────────────────────────────────────────
# • Push a tag like "v1.1" → full build + GitHub Release created automatically
# • Push to main/master   → build only (artifacts kept 30 days, no release)
# • Manual "Run workflow" → build only
on:
  push:
    branches: [ main, master ]
    tags:     [ 'v*' ]          # e.g. v1.1, v2.0.1
  workflow_dispatch:

# Allow the release job to create / update GitHub Releases
permissions:
  contents: write

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # macOS → SmartCityTraffic-<version>.dmg
  # ──────────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Resolve app version
        run: |
          version="1.1"
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "APP_VERSION=$version" >> "$GITHUB_ENV"
          echo "Using APP_VERSION=$version"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Compile
        run: |
          mkdir -p out
          find src -name "*.java" | xargs javac -d out

      - name: Build JAR
        run: |
          jar --create \
              --file SmartCityTraffic.jar \
              --main-class com.smartcity.traffic.Main \
              -C out .

      - name: Package DMG with jpackage
        run: |
          mkdir -p dist
          jpackage \
            --type dmg \
            --name "SmartCityTraffic" \
            --app-version "$APP_VERSION" \
            --vendor "OOPS Project" \
            --description "Smart City Traffic Simulator" \
            --input . \
            --main-jar SmartCityTraffic.jar \
            --main-class com.smartcity.traffic.Main \
            --dest dist \
            --java-options "-Xmx512m" \
            --mac-package-name "SmartCityTraffic"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartCityTraffic-macOS
          path: dist/*.dmg
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # Windows → SmartCityTraffic-<version>.exe
  # ──────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Resolve app version
        shell: pwsh
        run: |
          $version = "1.1"
          if ($env:GITHUB_REF_TYPE -eq "tag" -and $env:GITHUB_REF_NAME.StartsWith("v")) {
            $version = $env:GITHUB_REF_NAME.Substring(1)
          }
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Using APP_VERSION=$version"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Compile
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          $files = Get-ChildItem -Recurse -Filter *.java src | Select-Object -ExpandProperty FullName
          javac -d out $files

      - name: Build JAR
        shell: pwsh
        run: |
          jar --create `
              --file SmartCityTraffic.jar `
              --main-class com.smartcity.traffic.Main `
              -C out .

      - name: Add WiX to PATH
        shell: pwsh
        run: |
          # WiX 3.x is pre-installed on windows-latest; find it dynamically.
          $wixDir = Get-ChildItem "C:\Program Files (x86)" -Filter "WiX Toolset v3*" -Directory |
                    Sort-Object Name -Descending |
                    Select-Object -First 1 -ExpandProperty FullName
          if (-not $wixDir) {
            choco install wixtoolset -y --no-progress
            $wixDir = Get-ChildItem "C:\Program Files (x86)" -Filter "WiX Toolset v3*" -Directory |
                      Sort-Object Name -Descending |
                      Select-Object -First 1 -ExpandProperty FullName
          }
          Write-Host "Using WiX at: $wixDir\bin"
          "$wixDir\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Package EXE with jpackage
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          jpackage `
            --type exe `
            --name "SmartCityTraffic" `
            --app-version "$env:APP_VERSION" `
            --vendor "OOPS Project" `
            --description "Smart City Traffic Simulator" `
            --input . `
            --main-jar SmartCityTraffic.jar `
            --main-class com.smartcity.traffic.Main `
            --dest dist `
            --java-options "-Xmx512m" `
            --win-shortcut `
            --win-menu `
            --win-menu-group "Smart City" `
            --win-dir-chooser

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartCityTraffic-Windows
          path: dist/*.exe
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # Linux → smartcitytraffic-<version>.deb + .rpm
  # ──────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux DEB + RPM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Resolve app version
        run: |
          version="1.1"
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "APP_VERSION=$version" >> "$GITHUB_ENV"
          echo "Using APP_VERSION=$version"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install RPM tools
        run: sudo apt-get install -y rpm

      - name: Compile
        run: |
          mkdir -p out
          find src -name "*.java" | xargs javac -d out

      - name: Build JAR
        run: |
          jar --create \
              --file SmartCityTraffic.jar \
              --main-class com.smartcity.traffic.Main \
              -C out .

      - name: Package DEB with jpackage
        run: |
          mkdir -p dist
          jpackage \
            --type deb \
            --name "smartcitytraffic" \
            --app-version "$APP_VERSION" \
            --vendor "OOPS Project" \
            --description "Smart City Traffic Simulator" \
            --input . \
            --main-jar SmartCityTraffic.jar \
            --main-class com.smartcity.traffic.Main \
            --dest dist \
            --java-options "-Xmx512m" \
            --linux-shortcut \
            --linux-menu-group "Education"

      - name: Package RPM with jpackage
        run: |
          jpackage \
            --type rpm \
            --name "smartcitytraffic" \
            --app-version "$APP_VERSION" \
            --vendor "OOPS Project" \
            --description "Smart City Traffic Simulator" \
            --input . \
            --main-jar SmartCityTraffic.jar \
            --main-class com.smartcity.traffic.Main \
            --dest dist \
            --java-options "-Xmx512m" \
            --linux-shortcut \
            --linux-menu-group "Education"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SmartCityTraffic-Linux
          path: |
            dist/*.deb
            dist/*.rpm
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # Release → only runs when a version tag is pushed (e.g. git tag v1.1)
  # Waits for all 3 builds, then publishes a GitHub Release with every file.
  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [ build-macos, build-windows, build-linux ]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: SmartCityTraffic-macOS
          path: release-files

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: SmartCityTraffic-Windows
          path: release-files

      - name: Download Linux installers
        uses: actions/download-artifact@v4
        with:
          name: SmartCityTraffic-Linux
          path: release-files

      - name: List release files
        run: ls -lh release-files/

      - name: Prepare release body
        run: |
          version="${GITHUB_REF_NAME#v}"
          cat > release-body.md <<'EOF'
          ## Smart City Traffic Simulator ${GITHUB_REF_NAME}

          ### Downloads
          | Platform | Installer |
          |----------|-----------|
          | 🍎 macOS | `SmartCityTraffic-${version}.dmg` |
          | 🪟 Windows | `SmartCityTraffic-${version}.exe` |
          | 🐧 Linux (Debian/Ubuntu) | `smartcitytraffic_${version}-1_amd64.deb` |
          | 🐧 Linux (Fedora/RHEL) | `smartcitytraffic-${version}-1.x86_64.rpm` |

          > **No Java required** — all installers bundle their own JRE.

          ### Features
          - 4-way smart traffic intersection simulation
          - Real-time adaptive signal control
          - Emergency vehicle (ambulance) override
          - Pause/Resume, speed control, per-lane stats
          - In-app log viewer with file logging
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Smart City Traffic Simulator ${{ github.ref_name }}"
          body_path: release-body.md
          files: release-files/*
          draft: false
          prerelease: false
